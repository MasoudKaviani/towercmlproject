data:
  raw_path: data/raw/telecom_tower_dataset.csv
  processed_path: data/processed/features.csv
  test_size: 0.2
  random_state: 42

features:
  drop_cols:
    - tower_id
    - province
  target: tower_status
  categorical_cols:
    - tower_type

train:
  model: random_forest
  n_estimators: 200
  max_depth: 15
  min_samples_split: 5
  min_samples_leaf: 2
  class_weight: balanced
  random_state: 42
  n_jobs: -1

evaluate:
  threshold: 0.5
  metrics_path: reports/metrics.json
  plots_path: reports/
