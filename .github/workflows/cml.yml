name: CML — Train, Evaluate & Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # allow manual trigger

env:
  PYTHONUNBUFFERED: "1"

jobs:
  train-and-report:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for DVC diff

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── CML setup ─────────────────────────────────────────────────────────
      # canvas@2 (required by CML for plot rendering) needs these native libs
      - name: Install system deps for CML canvas
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev \
            libpixman-1-dev

      - name: Set up CML
        uses: iterative/setup-cml@v2

      # ── DVC pipeline ──────────────────────────────────────────────────────
      - name: Set up DVC
        run: |
          dvc version
          # If using a remote (S3, GCS, etc.) add credentials here via secrets:
          # dvc remote modify myremote access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          # dvc remote modify myremote secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Run DVC pipeline
        run: dvc repro --no-commit
        # --no-commit skips writing to DVC cache during CI; remove if you have a remote

      # ── Build CML report ──────────────────────────────────────────────────
      - name: Generate CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Start report
          echo "## 🗼 Tower Status Model — Evaluation Report" >> report.md
          echo "" >> report.md
          echo "**Commit:** \`${{ github.sha }}\`  " >> report.md
          echo "**Branch:** \`${{ github.ref_name }}\`  " >> report.md
          echo "**Triggered by:** ${{ github.event_name }}" >> report.md
          echo "" >> report.md

          # Metrics table
          echo "### 📊 Metrics" >> report.md
          echo "" >> report.md
          echo "| Metric | Value |" >> report.md
          echo "|--------|-------|" >> report.md
          python - << 'EOF'
          import json, sys
          with open("reports/metrics.json") as f:
              m = json.load(f)
          lines = [f"| {k.upper()} | **{v}** |" for k, v in m.items()]
          print("\n".join(lines))
          EOF
          >> report.md

          echo "" >> report.md
          echo "### 📈 ROC Curve" >> report.md
          cml draw --title "ROC Curve" reports/roc_curve.png >> report.md || \
            echo "![ROC Curve](reports/roc_curve.png)" >> report.md

          echo "" >> report.md
          echo "### 🔲 Confusion Matrix" >> report.md
          cml draw --title "Confusion Matrix" reports/confusion_matrix.png >> report.md || \
            echo "![Confusion Matrix](reports/confusion_matrix.png)" >> report.md

          echo "" >> report.md
          echo "### 🌲 Feature Importance (Top 15)" >> report.md
          cml draw --title "Feature Importance" reports/feature_importance.png >> report.md || \
            echo "![Feature Importance](reports/feature_importance.png)" >> report.md

          echo "" >> report.md
          echo "### 🔁 DVC Parameter Diff" >> report.md
          echo '```' >> report.md
          dvc params diff HEAD~1 2>/dev/null || echo "No previous commit to diff against." >> report.md
          echo '```' >> report.md

          echo "" >> report.md
          echo "### 📉 DVC Metrics Diff" >> report.md
          echo '```' >> report.md
          dvc metrics diff HEAD~1 2>/dev/null || echo "No previous metrics to diff against." >> report.md
          echo '```' >> report.md

          cml comment create report.md

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.sha }}
          path: |
            models/model.pkl
            models/preprocessor.pkl
            reports/metrics.json
            reports/*.png
          retention-days: 30

  # ── Docker build & push (only on main) ────────────────────────────────────
  build-and-push:
    needs: train-and-report
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
